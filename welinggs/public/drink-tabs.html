<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drinks Menu</title>
  <link rel="stylesheet" href="WELLINGS PROTOTYPE.css">
  <link rel="icon" type="image/png" href="welinggs bg removed.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="head">
    <div class="dropdown">
      <button class="dropbtn">
        <label class="headtitle">DRINKS</label>
      </button>
      <div class="dropdown-content">
        <a href="welinggstarters.html">STARTERS</a>
        <a href="platters.html">PLATTERS</a>
        <a href="mainsw.html">MAINS</a>
      </div>
    </div>
    <div class="chrtt">
      <svg class="cart-icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M5 4h1.5L9 16m0 0h8m-8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm-8.5-3h9.25L19 7H7.312"/>
      </svg>
      <span>0</span>
    </div>
  </div>

  <!-- Tab Navigation -->
  <nav>
    <ul class="nav-links">
      <li class="nav-link active" data-tab="alcoholic">Alcoholic</li>
      <li class="nav-link" data-tab="non-alcoholic">Non-Alcoholic</li>
      <li class="nav-link" data-tab="water">Water</li>
    </ul>
  </nav>

  <!-- Tab Content -->
  <div class="content">
    <!-- Alcoholic Drinks -->
    <div id="alcoholic" class="tab-content active">
      <div class="container" data-menu-container data-category="drinks" data-subcategory="alcoholic-drinks"></div>
    </div>

    <!-- Non-Alcoholic Drinks -->
    <div id="non-alcoholic" class="tab-content">
      <div class="container" data-menu-container data-category="drinks" data-subcategory="non-alcoholic-drinks"></div>
    </div>

    <!-- Water -->
    <div id="water" class="tab-content">
      <div class="container" data-menu-container data-category="drinks" data-subcategory="water"></div>
    </div>
  </div>

  <!-- Cart Tab -->
  <div class="cart-tab">
    <h1 class="foodcrt">FOOD CART</h1>
    <div class="listcart"></div>
    <div class="btn">
      <button class="close">Close</button>
      <button class="checkout">Check Out</button>
    </div>
  </div>

  <!-- Order Confirmation Popup -->
  <div class="order-confirmation" id="orderConfirmation">
    <h2>Order Confirmation</h2>
    <div id="confirmationSummary"></div>
    <div class="estimated-time">
      Estimated Preparation Time: <span id="estTime">15-20 minutes</span>
    </div>
    <div class="countdown-container">
      <div class="countdown-label">Your order will be ready in:</div>
      <div class="countdown-timer" id="countdownTimer">--:--</div>
    </div>
    <button class="confirm-ok">OK</button>
  </div>

  <script src="welinggs.js"></script>
</body>
</html>
